<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ZakiWorld · Panel de soporte</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Outfit:wght@300;400;500;600&family=Silkscreen:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0b0918;--void-2:#110d24;--dusk:#171331;--dusk-2:#1f1941;--line:#2c2455;
  --amethyst:#9b6dff;--amethyst-soft:#b493ff;--aurora:#5ef2c8;--gold:#ffc94a;--danger:#ff6d8a;
  --text:#edeaf7;--text-dim:#a79fc9;
  --font-display:"Bricolage Grotesque",sans-serif;--font-body:"Outfit",sans-serif;--font-pixel:"Silkscreen",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--void);color:var(--text);font-family:var(--font-body);min-height:100vh}
::selection{background:var(--amethyst);color:#fff}

/* Login */
.login{min-height:100vh;display:grid;place-items:center;padding:1rem}
.login__box{background:var(--void-2);border:1px solid var(--line);border-radius:16px;padding:2.5rem;width:min(400px,94vw);text-align:center}
.login__box svg{width:52px;height:52px;margin:0 auto 1.2rem}
.login__box h1{font-family:var(--font-display);font-size:1.5rem;margin-bottom:.4rem}
.login__box p{color:var(--text-dim);font-size:.9rem;margin-bottom:1.6rem}
.login input{width:100%;background:var(--dusk);border:1px solid var(--line);color:var(--text);font-family:var(--font-body);font-size:1rem;padding:.9rem 1rem;border-radius:10px;outline:none;margin-bottom:1rem;transition:border-color .3s}
.login input:focus{border-color:var(--amethyst)}
.login button{width:100%;background:linear-gradient(180deg,var(--gold),#e8a520);color:#3a2600;border:none;font-family:var(--font-pixel);font-size:.72rem;padding:.9rem;border-radius:10px;cursor:pointer;transition:filter .2s}
.login button:hover{filter:brightness(1.08)}
.login__hint{color:var(--danger);font-size:.85rem;min-height:1.2rem;margin-top:.8rem}

/* App */
.app{display:none;min-height:100vh}
.app.active{display:block}
.topbar{position:sticky;top:0;z-index:10;background:rgba(11,9,24,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem}
.topbar__brand{display:flex;align-items:center;gap:.6rem;font-family:var(--font-display);font-weight:800;font-size:1.15rem}
.topbar__brand svg{width:30px;height:30px}
.topbar__brand em{color:var(--amethyst);font-style:normal}
.badge{font-family:var(--font-pixel);font-size:.55rem;padding:.3rem .6rem;border-radius:6px;background:var(--dusk);border:1px solid var(--line);color:var(--text-dim)}
.topbar__actions{margin-left:auto;display:flex;gap:.7rem;align-items:center}
.btn-sm{font-family:var(--font-pixel);font-size:.6rem;padding:.55rem .9rem;border-radius:8px;border:1px solid var(--line);background:var(--dusk);color:var(--text);cursor:pointer;transition:border-color .25s}
.btn-sm:hover{border-color:var(--amethyst)}

.wrap{max-width:1200px;margin:0 auto;padding:1.8rem 1.5rem}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.8rem}
.stat{background:var(--dusk);border:1px solid var(--line);border-radius:12px;padding:1.2rem}
.stat__num{font-family:var(--font-pixel);font-size:1.5rem;color:var(--gold)}
.stat__label{color:var(--text-dim);font-size:.85rem;margin-top:.3rem}

/* Filtros */
.filters{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.4rem}
.chip{font-family:var(--font-pixel);font-size:.58rem;padding:.55rem .9rem;border-radius:8px;border:1px solid var(--line);background:var(--dusk);color:var(--text-dim);cursor:pointer;transition:all .25s}
.chip:hover{border-color:var(--amethyst)}
.chip.active{background:var(--amethyst);color:#160d33;border-color:transparent}

/* Tickets */
.tickets{display:grid;gap:1rem}
.ticket{background:var(--dusk);border:1px solid var(--line);border-radius:12px;padding:1.3rem;transition:border-color .3s}
.ticket:hover{border-color:var(--amethyst)}
.ticket[data-status="nuevo"]{border-left:3px solid var(--aurora)}
.ticket[data-status="leido"]{border-left:3px solid var(--gold)}
.ticket[data-status="resuelto"]{border-left:3px solid var(--line);opacity:.65}
.ticket__head{display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem;flex-wrap:wrap}
.ticket__avatar{width:38px;height:38px;border-radius:8px;image-rendering:pixelated;flex:none}
.ticket__nick{font-family:var(--font-display);font-weight:700;font-size:1.05rem}
.ticket__reason{font-family:var(--font-pixel);font-size:.55rem;padding:.3rem .55rem;border-radius:6px;background:var(--void-2);border:1px solid var(--line)}
.ticket__reason.pago{color:var(--gold)}
.ticket__reason.desbaneo{color:var(--danger)}
.ticket__reason.error{color:var(--aurora)}
.ticket__reason.reporte{color:var(--amethyst-soft)}
.ticket__reason.cuenta{color:var(--amethyst)}
.ticket__date{margin-left:auto;color:var(--text-dim);font-size:.8rem}
.ticket__msg{color:var(--text);line-height:1.6;background:var(--void-2);border-radius:10px;padding:1rem;font-size:.95rem;white-space:pre-wrap;word-break:break-word}
.ticket__foot{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap;align-items:center}
.ticket__purchases{font-size:.85rem;color:var(--text-dim);margin-right:auto}
.ticket__purchases strong{color:var(--gold)}
.ticket__purchases .loading{opacity:.5}

.empty{text-align:center;padding:4rem 1rem;color:var(--text-dim)}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--amethyst);border-radius:50%;animation:spin 1s linear infinite;margin:2rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login__box">
    <svg viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="#171331" stroke="#2c2455" stroke-width="1.5"/><g transform="translate(9,14.5) scale(0.46)" fill="#5ef2c8"><polygon points="19.5,0 19.5,19.5 72,20 52.5,40 54,41.5 81,41 100,19.5 100,0"/><polygon points="0,51 0,70 80,70 81,67.5 80.5,51 28,50.5 48,29.5 19,29.5"/></g></svg>
    <h1>Panel de soporte</h1>
    <p>Introduce la clave de administrador para acceder.</p>
    <input type="password" id="admin-key" placeholder="Clave de administrador" autocomplete="current-password">
    <button id="login-btn">ENTRAR ▸</button>
    <div class="login__hint" id="login-hint"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar__brand">
      <svg viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="#171331" stroke="#2c2455" stroke-width="1.5"/><g transform="translate(9,14.5) scale(0.46)" fill="#5ef2c8"><polygon points="19.5,0 19.5,19.5 72,20 52.5,40 54,41.5 81,41 100,19.5 100,0"/><polygon points="0,51 0,70 80,70 81,67.5 80.5,51 28,50.5 48,29.5 19,29.5"/></g></svg>
      Zaki<em>World</em> <span class="badge">SOPORTE</span>
    </div>
    <div class="topbar__actions">
      <button class="btn-sm" id="refresh-btn">↻ ACTUALIZAR</button>
      <button class="btn-sm" id="logout-btn">SALIR</button>
    </div>
  </div>

  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="filters" id="filters">
      <button class="chip active" data-filter="todos">TODOS</button>
      <button class="chip" data-filter="nuevo">NUEVOS</button>
      <button class="chip" data-filter="leido">LEÍDOS</button>
      <button class="chip" data-filter="resuelto">RESUELTOS</button>
      <button class="chip" data-filter="pago">PAGOS</button>
      <button class="chip" data-filter="desbaneo">DESBANEOS</button>
      <button class="chip" data-filter="error">ERRORES</button>
      <button class="chip" data-filter="reporte">DENUNCIAS</button>
      <button class="chip" data-filter="cuenta">CUENTA</button>
    </div>
    <div id="tickets-container"><div class="spinner"></div></div>
  </div>
</div>

<script>
const WORKER_URL="https://tebex-api.studio-iris2026.workers.dev";
let ADMIN_KEY=sessionStorage.getItem("zw_admin_key")||"";
let ALL_TICKETS=[];
let CURRENT_FILTER="todos";
const REASON_LABELS={pago:"Problema con un pago o compra",desbaneo:"Apelación de sanción",error:"Reporte de bug o error",reporte:"Denuncia de jugador",cuenta:"Problema de cuenta o rango",otro:"Consulta general"};

const $=id=>document.getElementById(id);

/* ── LOGIN ── */
function tryLogin(key){
  return fetch(WORKER_URL+"/tickets",{headers:{"X-Admin-Key":key}})
    .then(r=>{
      if(r.status===401)throw new Error("Clave incorrecta");
      if(!r.ok)throw new Error("Error del servidor");
      return r.json();
    });
}
$("login-btn").onclick=()=>{
  const key=$("admin-key").value.trim();
  if(!key){$("login-hint").textContent="Escribe la clave.";return;}
  $("login-hint").textContent="Verificando…";
  tryLogin(key).then(data=>{
    ADMIN_KEY=key;
    sessionStorage.setItem("zw_admin_key",key);
    showApp(data.tickets||[]);
  }).catch(e=>{$("login-hint").textContent=e.message;});
};
$("admin-key").addEventListener("keydown",e=>{if(e.key==="Enter")$("login-btn").click();});

/* ── APP ── */
function showApp(tickets){
  $("login").style.display="none";
  $("app").classList.add("active");
  ALL_TICKETS=tickets;
  render();
}
function loadTickets(){
  $("tickets-container").innerHTML='<div class="spinner"></div>';
  fetch(WORKER_URL+"/tickets",{headers:{"X-Admin-Key":ADMIN_KEY}})
    .then(r=>r.json()).then(data=>{ALL_TICKETS=data.tickets||[];render();})
    .catch(()=>{$("tickets-container").innerHTML='<div class="empty">Error al cargar los mensajes.</div>';});
}
$("refresh-btn").onclick=loadTickets;
$("logout-btn").onclick=()=>{sessionStorage.removeItem("zw_admin_key");location.reload();};

document.querySelectorAll(".chip").forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
    c.classList.add("active");
    CURRENT_FILTER=c.dataset.filter;
    render();
  };
});

function render(){
  // Stats
  const total=ALL_TICKETS.length;
  const nuevos=ALL_TICKETS.filter(t=>t.status==="nuevo").length;
  const resueltos=ALL_TICKETS.filter(t=>t.status==="resuelto").length;
  $("stats").innerHTML=`
    <div class="stat"><div class="stat__num">${total}</div><div class="stat__label">Mensajes totales</div></div>
    <div class="stat"><div class="stat__num">${nuevos}</div><div class="stat__label">Sin leer</div></div>
    <div class="stat"><div class="stat__num">${resueltos}</div><div class="stat__label">Resueltos</div></div>
  `;

  // Filtrar
  let list=ALL_TICKETS;
  const statusFilters=["nuevo","leido","resuelto"];
  const reasonFilters=["pago","desbaneo","error","reporte","cuenta","otro"];
  if(statusFilters.includes(CURRENT_FILTER))list=list.filter(t=>t.status===CURRENT_FILTER);
  else if(reasonFilters.includes(CURRENT_FILTER))list=list.filter(t=>t.reason===CURRENT_FILTER);

  if(!list.length){
    $("tickets-container").innerHTML='<div class="empty">No hay mensajes en esta categoría.</div>';
    return;
  }

  $("tickets-container").innerHTML='<div class="tickets">'+list.map(t=>{
    const d=new Date(t.ts);
    const fecha=d.toLocaleDateString("es-ES")+" "+d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
    return `<div class="ticket" data-status="${t.status}" data-id="${t.id}">
      <div class="ticket__head">
        <img class="ticket__avatar" src="https://mc-heads.net/avatar/${encodeURIComponent(t.nick)}/38" alt="">
        <span class="ticket__nick">${esc(t.nick)}</span>
        <span class="ticket__reason ${t.reason}">${esc(t.reasonLabel||REASON_LABELS[t.reason]||t.reason)}</span>
        <span class="ticket__date">${fecha}</span>
      </div>
      <div class="ticket__msg">${esc(t.message)}</div>
      <div class="ticket__foot">
        <span class="ticket__purchases" data-nick="${encodeURIComponent(t.nick)}"><span class="loading">Cargando compras…</span></span>
        ${t.status!=="leido"?`<button class="btn-sm" data-act="leido" data-id="${t.id}">MARCAR LEÍDO</button>`:""}
        ${t.status!=="resuelto"?`<button class="btn-sm" data-act="resuelto" data-id="${t.id}">✓ RESOLVER</button>`:`<button class="btn-sm" data-act="nuevo" data-id="${t.id}">REABRIR</button>`}
      </div>
    </div>`;
  }).join("")+'</div>';

  // Cargar compras de cada usuario (Tebex)
  document.querySelectorAll(".ticket__purchases").forEach(el=>{
    const nick=el.dataset.nick;
    fetch(WORKER_URL+"/purchases?nick="+nick,{headers:{"X-Admin-Key":ADMIN_KEY}})
      .then(r=>r.json()).then(d=>{
        if(d.count>0){
          el.innerHTML=`💳 <strong>${d.count}</strong> compra(s) · <strong>${d.total} ${d.purchases[0]?.currency||"EUR"}</strong> en total`;
        }else{
          el.innerHTML=`<span style="opacity:.6">Sin compras registradas</span>`;
        }
      }).catch(()=>{el.innerHTML=`<span style="opacity:.5">Compras no disponibles</span>`;});
  });

  // Botones de estado
  document.querySelectorAll("[data-act]").forEach(b=>{
    b.onclick=()=>{
      const id=b.dataset.id, status=b.dataset.act;
      b.textContent="…";
      fetch(WORKER_URL+"/tickets/update",{
        method:"POST",headers:{"Content-Type":"application/json","X-Admin-Key":ADMIN_KEY},
        body:JSON.stringify({id,status}),
      }).then(r=>r.json()).then(()=>{
        const t=ALL_TICKETS.find(x=>x.id===id);if(t)t.status=status;render();
      }).catch(()=>{b.textContent="Error";});
    };
  });
}

function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

/* Auto-login si ya hay clave guardada */
if(ADMIN_KEY){
  tryLogin(ADMIN_KEY).then(data=>showApp(data.tickets||[])).catch(()=>{sessionStorage.removeItem("zw_admin_key");});
}
</script>
</body>
</html>
